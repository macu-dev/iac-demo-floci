name: Floci ECR CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Floci Service Container
    services:
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Wait for Floci to be ready
        run: |
          echo "Waiting for Floci to initialize..."
          while ! curl -s http://localhost:4566/_floci/health | grep -q "ok"; do
            sleep 1
          done
          echo "Floci is ready!"

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: environments/dev
        run: terraform apply -auto-approve

      - name: Build Docker Image
        run: |
          docker build -t dev-iac-floci-repo:latest .

      - name: Tag Image for Local ECR
        run: |
          docker tag dev-iac-floci-repo:latest localhost:4566/dev-iac-floci-repo:latest

      - name: Push to Floci ECR
        run: |
          # Push directly. No docker login required for Floci!
          docker push localhost:4566/dev-iac-floci-repo:latest
